<! --Problem Statement:

Execute the following code and observe the output to see the effect of 'while' loop. 

Activity:

Try the code to generate different multiplication tables.

Note: You can execute this tryout in your Visual Studio Code IDE or any other editor in case of any issue in executing/viewing response in the below- given pane.
-->

<html>
    <head>
        <style>
            body {
                padding-top: 10px;
            }
        </style>
    </head>
	<body class="container-fluid">
		<div class="panel panel-primary">
			<div class="panel-heading">
				<h3>while Loop</h3>
			</div>
			<div class="panel-body">
				<script>
                   var loopVar = 1;
                   while (loopVar <= 10) {
                     document.write("2 *" + loopVar +"=");
                     document.write(2 * loopVar);
                     document.write("<br/>");
                     loopVar++;
                   }
				</script>
			</div>
		</div>
	</body>
</html>
